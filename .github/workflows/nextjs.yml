name: React + Node.js CI Workflow

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show repository structure
        run: ls -R

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Backend Dependencies
        run: npm install

      - name: Run Backend Tests
        run: |
          echo "Running lint tests as backend tests..."
          npm run lint

      - name: Install Frontend Dependencies
        run: echo "Frontend dependencies were evaluated in previous step (Next.js is full-stack)."

      - name: Build React App
        run: npm run build
        env:
          MONGODB_URI: "mongodb://localhost:27017/test"
          NEXTAUTH_SECRET: "dummy_secret_for_ci_build"
          NEXTAUTH_URL: "http://localhost:3000"
